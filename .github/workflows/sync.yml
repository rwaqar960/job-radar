name: Sync jobs and publish

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite, mbstring, dom, fileinfo, curl

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Configure environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate

      - name: Migrate database
        run: php artisan migrate --force

      - name: Sync job postings
        run: php artisan jobs:sync

      - name: Export static JSON
        run: php artisan jobs:export-static

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json
          git diff --staged --quiet || git commit -m "Sync job postings"
          git push
